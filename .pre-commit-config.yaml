# pre-commit autoupdate --freeze
fail_fast: true
default_stages: [pre-commit, pre-push]
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.3.0
    hooks:
      # Git style
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-vcs-permalinks
      - id: forbid-new-submodules
      - id: no-commit-to-branch
        args:
          - -b main
          - -b master
          - -b develop
          - -p support/*

      # Common errors
      - id: check-symlinks
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
        exclude: CHANGELOG.md
      - id: check-yaml
        args:
          - --allow-multiple-documents
      - id: check-merge-conflict
      - id: check-executables-have-shebangs

      # Cross platform
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: '\.(csv|ps1)$'
      - id: mixed-line-ending
        args: [--fix=crlf]
        files: '\.(csv|ps1)$'

      # Security
      - id: detect-private-key
        exclude: read-resource-docs.md

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: 6c1cc8135045111b676a42f4e536be09a4a5a84b # v3.0.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.72.1
    hooks:
      - id: terraform_fmt
      - id: terraform_tflint
        args:
          - --args=--config=__GIT_WORKING_DIR__/.tflint.hcl
          - --args=--module
      - id: terraform_docs
        args:
          - --args=--show=all
      - id: terraform_validate
      - id: terraform_checkov
        stages: [pre-push]
        args:
          - --args=--quiet
          - --args=--compact
          - --args=--external-checks-dir /.pre-commit/checkov/external_checks
          - --args=--external-modules-download-path /.pre-commit/checkov/external_modules
          - --args=--skip-path terraform.tfstate
          - --args=--skip-path terraform.tfstate.backup
          - --args=--skip-path .*/read-resource-docs.md
          - --args=--skip-path .pre-commit
          - --args=--skip-path .vscode
          - --args=--skip-path xgithub.com/terraform-google-modules/terraform-google-project-factory/
          # TODO: reinstate after fixing validation issues
          - --args=--skip-path gke
          #- --args=--download-external-modules true
          - --args=--enable-secret-scan-all-files
          # - --args=--config=__GIT_WORKING_DIR__/.checkov.yml
          # - --args=--create-config true
